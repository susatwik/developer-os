<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Developer OS{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f1ea;
        --panel: #ffffff;
        --panel-alt: #f8f4ee;
        --text: #1f2933;
        --muted: #65707a;
        --accent: #0f766e;
        --accent-2: #1d4ed8;
        --border: #d6d0c4;
        --shadow: 0 18px 50px rgba(17, 24, 39, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 28%),
          radial-gradient(circle at top right, rgba(29, 78, 216, 0.12), transparent 30%),
          var(--bg);
      }
      a { color: var(--accent-2); text-decoration: none; }
      a:hover { text-decoration: underline; }
      .shell { max-width: 1200px; margin: 0 auto; padding: 24px; }
      .topbar {
        display: flex; gap: 16px; align-items: center; justify-content: space-between;
        padding: 20px 24px; border: 1px solid var(--border); border-radius: 24px;
        background: rgba(255, 255, 255, 0.82); backdrop-filter: blur(10px); box-shadow: var(--shadow);
        margin-bottom: 22px;
      }
      .brand h1 { margin: 0; font-size: 1.5rem; }
      .brand p { margin: 4px 0 0; color: var(--muted); }
      .nav { display: flex; gap: 12px; flex-wrap: wrap; }
      .nav a {
        padding: 10px 14px; border-radius: 999px; border: 1px solid var(--border);
        background: var(--panel); color: var(--text);
      }
      .nav a.primary { background: var(--accent); color: white; border-color: var(--accent); }
      .grid { display: grid; gap: 20px; }
      .cards { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
      .two-col { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
      .panel {
        background: rgba(255, 255, 255, 0.92); border: 1px solid var(--border); border-radius: 22px;
        padding: 20px; box-shadow: var(--shadow);
      }
      .panel h2, .panel h3 { margin-top: 0; }
      .metric { display: grid; gap: 8px; }
      .metric strong { font-size: 2rem; line-height: 1; }
      .metric span { color: var(--muted); }
      .muted { color: var(--muted); }
      .badge {
        display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 999px;
        background: var(--panel-alt); border: 1px solid var(--border); color: var(--muted);
      }
      form { display: grid; gap: 12px; }
      label { display: grid; gap: 6px; font-size: 0.95rem; }
      input, select, textarea {
        width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 14px;
        background: white; color: var(--text); font: inherit;
      }
      textarea { min-height: 110px; resize: vertical; }
      .form-row { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
      button {
        border: 0; border-radius: 14px; padding: 12px 16px; font: inherit; font-weight: 700;
        background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; cursor: pointer;
      }
      button.secondary { background: white; color: var(--text); border: 1px solid var(--border); }
      ul { margin: 0; padding-left: 20px; }
      .list { display: grid; gap: 14px; }
      .entry {
        padding: 14px 16px; border-radius: 16px; background: var(--panel-alt); border: 1px solid var(--border);
      }
      .entry h4 { margin: 0 0 6px; }
      .entry p { margin: 0; color: var(--muted); }
      .notice {
        padding: 12px 14px; border-radius: 14px; background: rgba(15, 118, 110, 0.12);
        border: 1px solid rgba(15, 118, 110, 0.28); margin-bottom: 16px;
      }
      .page-footer { margin: 24px 0 8px; color: var(--muted); font-size: 0.94rem; }
      .section-title { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
      .pill { font-size: 0.85rem; padding: 5px 10px; border-radius: 999px; background: rgba(29, 78, 216, 0.12); color: var(--accent-2); }
      @media (max-width: 720px) {
        .shell { padding: 16px; }
        .topbar { padding: 18px; border-radius: 20px; flex-direction: column; align-items: flex-start; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <h1>Developer OS</h1>
          <p>Lightweight analytics dashboard for learning, coding, and job search progress.</p>
        </div>
        <nav class="nav">
          <a class="primary" href="/dashboard">Dashboard</a>
          <a href="/stats">Statistics</a>
          <a href="/search">Search</a>
          <a href="/docs">API Docs</a>
        </nav>
      </header>

      {% block content %}{% endblock %}

      <footer class="page-footer">
        Built with FastAPI, Jinja2, and your existing Developer OS data stores.
      </footer>
    </div>
  </body>
</html>
