services:
  developer-os:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DEVOS_HOST: 0.0.0.0
      DEVOS_PORT: 8000
      WEB_CONCURRENCY: 2
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
