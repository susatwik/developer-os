name: Feature request
description: Suggest an improvement or new capability for Developer OS.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Thanks for sharing an idea to improve Developer OS."
  - type: textarea
    id: problem
    attributes:
      label: Problem / Opportunity
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the feature or workflow you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Share any alternatives or tradeoffs you've considered.
