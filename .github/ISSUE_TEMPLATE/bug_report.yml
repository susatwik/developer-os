name: Bug report
description: Report a reproducible bug in Developer OS.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to report an issue."
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug and what you expected to happen.
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide the smallest possible reproduction steps.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See the error ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant output, stack traces, or screenshots.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, deployment target, etc.
      placeholder: macOS 14, Python 3.12, local Docker
